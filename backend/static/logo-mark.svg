<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-labelledby="title desc">
  <title id="title">GOEUN SERVER HUB</title>
  <desc id="desc">Premium gateway logo with an architectural portal and a G-shaped orbit.</desc>
  <defs>
