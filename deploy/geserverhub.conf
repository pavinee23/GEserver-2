# HTTP → HTTPS redirect
<VirtualHost *:80>
    ServerName geserverhub.com
    ServerAlias www.geserverhub.com

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# HTTPS — Reverse proxy to Next.js on port 3005
<VirtualHost *:443>
    ServerName geserverhub.com
    ServerAlias www.geserverhub.com

    # SSL — filled in by certbot automatically
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/geserverhub.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/geserverhub.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Proxy to Next.js
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3005/
    ProxyPassReverse / http://127.0.0.1:3005/

    # WebSocket support (Next.js HMR / streaming)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3005/$1 [P,L]

    ErrorLog  ${APACHE_LOG_DIR}/geserverhub_error.log
    CustomLog ${APACHE_LOG_DIR}/geserverhub_access.log combined
</VirtualHost>
